# ============================================================
# 02_checker  –  Validated & Aggregated Request Output
# ============================================================
# The checker enriches the raw intake data by:
#   - Assigning a canonical request_id (REQ-XXXXXX)
#   - Extracting implicit info from request_text (budget,
#     supplier constraints, …)
#   - Resolving the incumbent supplier from master data
#   - Tagging scenario types for downstream routing
#   - Aggregating duplicate / related requests
#
# This is the authoritative request record consumed by all
# downstream pipeline stages.
#
# Assumptions: single country (CH), currency (CHF), language (en).
# ============================================================

schema_version: "1.0"
module: 02_checker
direction: output
description: >
  Fully validated and aggregated purchase request. This record
  is the single source of truth for every downstream stage
  (policy evaluation, supplier matching, escalation, audit).

fields:

  # ── Identity & timestamps ──────────────────────────────────

  request_id:
    type: string
    required: true
    description: >
      Unique canonical identifier.
      Format: REQ-XXXXXX (zero-padded, sequential).
    examples:
      - "REQ-000001"
      - "REQ-000042"

  created_at:
    type: string
    format: datetime      # ISO 8601 (YYYY-MM-DDTHH:MM:SSZ)
    required: true
    description: Request creation timestamp.

  # ── Requester context ──────────────────────────────────────

  business_unit:
    type: string
    required: true
    description: Internal department requesting the purchase.
    examples:
      - "Digital Workplace"
      - "Regional IT"

  # ── Category ───────────────────────────────────────────────

  category_l1:
    type: string
    required: true
    description: High-level procurement category.
    enum:
      - IT
      - Facilities
      - Professional Services
      - Marketing

  category_l2:
    type: string
    required: true
    description: >
      Detailed subcategory, validated against categories.csv.
    enum:
      # IT
      - Laptops
      - Mobile Workstations
      - Desktop Workstations
      - Monitors
      - Docking Stations
      - Smartphones
      - Tablets
      - Rugged Devices
      - Accessories Bundles
      - Replacement / Break-Fix Pool Devices
      - Cloud Compute
      - Cloud Storage
      - Cloud Networking
      - Managed Cloud Platform Services
      - Cloud Security Services
      # Facilities
      - Workstations and Desks
      - Office Chairs
      - Meeting Room Furniture
      - Storage Cabinets
      - Reception and Lounge Furniture
      # Professional Services
      - Cloud Architecture Consulting
      - Cybersecurity Advisory
      - Data Engineering Services
      - Software Development Services
      - IT Project Management Services
      # Marketing
      - Search Engine Marketing (SEM)
      - Social Media Advertising
      - Content Production Services
      - Marketing Analytics Services
      - Influencer Campaign Management

  # ── Unstructured description ───────────────────────────────

  request_text:
    type: string
    required: true
    format: free_text
    description: >
      Original free-text request description as written by the
      operator. Preserved verbatim for downstream NLP stages
      and audit trail.

  # ── Quantity & measure ─────────────────────────────────────

  quantity:
    type: number
    required: true
    nullable: true
    description: >
      Requested quantity. May be null when the operator could
      not determine an exact figure, or inconsistent with what
      is stated in request_text (flagged via scenario_tags).

  unit_of_measure:
    type: string
    required: true
    description: Unit for the quantity field.
    examples:
      - "device"
      - "instance_hour"
      - "consulting_day"
      - "TB_month"
      - "unit"
      - "set"
      - "campaign"
      - "project"
      - "monthly_subscription"
      - "seat_license"

  # ── Budget ─────────────────────────────────────────────────

  budget_amount:
    type: number
    required: true
    nullable: true
    description: >
      Budget amount in CHF. May be null when the operator did
      not provide a budget. Extracted from request_text if not
      provided as a structured field.

  # ── Dates ──────────────────────────────────────────────────

  required_by_date:
    type: string
    format: date            # ISO 8601 (YYYY-MM-DD)
    required: true
    description: Requested delivery or service start date.

  # ── Supplier info ──────────────────────────────────────────

  preferred_supplier_mentioned:
    type: string
    required: false
    nullable: true
    description: >
      Supplier explicitly named by the requester. Preserved
      as stated — downstream stages resolve to supplier_id.
    examples:
      - "Dell Enterprise Europe"
      - "Accenture Advisory Europe"

  incumbent_supplier:
    type: string
    required: false
    nullable: true
    description: >
      Currently contracted supplier for this category, if any.
      Resolved from supplier master data.
    examples:
      - "Bechtle Workplace Solutions"

  # ── Delivery ───────────────────────────────────────────────

  delivery_address:
    type: string
    required: true
    description: >
      Delivery site within Switzerland.
    examples:
      - "Zurich"
      - "Geneva"
      - "Basel"

  # ── Scenario tagging ───────────────────────────────────────

  scenario_tags:
    type: list
    required: true
    item_type: string
    description: >
      Labels assigned by the checker to flag specific situations
      for downstream handling. A request may carry multiple tags.
    enum:
      - standard
      - missing_info
      - contradictory
      - budget_exceeded
      - urgent
      - restricted_supplier
      - aggregated

  # ── Aggregation metadata ───────────────────────────────────

  aggregated_from:
    type: list
    required: false
    nullable: true
    item_type: string
    description: >
      List of intake_ids that were merged into this record.
      Present only when scenario_tags includes "aggregated".
    examples:
      - ["INK-000003", "INK-000007"]

  # ── Traceability ───────────────────────────────────────────

  intake_id:
    type: string
    required: true
    description: >
      Reference back to the original intake record(s).
      For aggregated requests this points to the primary intake.
    examples:
      - "INK-000001"

  checker_notes:
    type: list
    required: false
    nullable: true
    item_type: string
    description: >
      Free-text notes added by the checker to flag issues,
      enrichment decisions, or aggregation rationale. Intended
      for downstream stages and audit trail.
    examples:
      - "Budget extracted from request_text: 25199.55 CHF"
      - "quantity in structured field (240) matches request_text"
      - "Merged with INK-000007: same category, same BU, same week"
