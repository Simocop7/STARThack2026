# ============================================================
# 01_intake  –  Operator Form Input
# ============================================================
# Raw data submitted by the operator through the procurement
# portal. This is the very first touchpoint of the pipeline.
#
# Assumptions: single country (CH), currency (CHF), language (en).
# ============================================================

schema_version: "1.0"
module: 01_intake
direction: input
description: >
  Dynamic form compiled by the operator. Contains both structured
  fields (drop-downs, date pickers, numeric inputs) and one
  free-text field for the unstructured request description.

fields:

  # ── Structured fields ──────────────────────────────────────

  business_unit:
    type: string
    required: true
    description: Internal department requesting the purchase.
    examples:
      - "Digital Workplace"
      - "Regional IT"

  category_l1:
    type: string
    required: true
    description: High-level procurement category.
    enum:
      - IT
      - Facilities
      - Professional Services
      - Marketing

  category_l2:
    type: string
    required: true
    description: >
      Detailed subcategory. Must be a valid child of the selected
      category_l1 (validated against categories.csv).
    enum:
      # IT
      - Laptops
      - Mobile Workstations
      - Desktop Workstations
      - Monitors
      - Docking Stations
      - Smartphones
      - Tablets
      - Rugged Devices
      - Accessories Bundles
      - Replacement / Break-Fix Pool Devices
      - Cloud Compute
      - Cloud Storage
      - Cloud Networking
      - Managed Cloud Platform Services
      - Cloud Security Services
      # Facilities
      - Workstations and Desks
      - Office Chairs
      - Meeting Room Furniture
      - Storage Cabinets
      - Reception and Lounge Furniture
      # Professional Services
      - Cloud Architecture Consulting
      - Cybersecurity Advisory
      - Data Engineering Services
      - Software Development Services
      - IT Project Management Services
      # Marketing
      - Search Engine Marketing (SEM)
      - Social Media Advertising
      - Content Production Services
      - Marketing Analytics Services
      - Influencer Campaign Management

  quantity:
    type: number
    required: true
    nullable: true
    description: >
      Requested quantity. May be left null when the operator
      cannot determine an exact figure (e.g. cloud usage).

  unit_of_measure:
    type: string
    required: true
    description: Unit for the quantity field.
    examples:
      - "device"
      - "instance_hour"
      - "consulting_day"
      - "unit"
      - "set"
      - "campaign"

  required_by_date:
    type: string
    format: date          # ISO 8601 (YYYY-MM-DD)
    required: true
    description: Requested delivery or service start date.

  preferred_supplier:
    type: string
    required: false
    nullable: true
    description: >
      Supplier explicitly named by the operator. Optional — may
      be left blank if no preference exists.
    examples:
      - "Dell Enterprise Europe"
      - "Accenture Advisory Europe"

  delivery_address:
    type: string
    required: true
    description: >
      Delivery site within Switzerland.
    examples:
      - "Zurich"
      - "Geneva"
      - "Basel"

  # ── Unstructured field ─────────────────────────────────────

  request_text:
    type: string
    required: true
    format: free_text
    description: >
      Free-text description of the purchase request written by
      the operator. May contain additional details such as budget
      hints, urgency notes, technical specs, or supplier
      constraints that are not captured by the structured fields.
    examples:
      - >
        Need 240 docking stations matching existing laptop fleet.
        Must be delivered by 2026-03-20 with premium specification.
        Budget capped at 25 199.55 CHF. Please use Dell Enterprise
        Europe with no exception.
      - >
        Need 400 consulting days of IT project management support
        starting next month. Budget is approximately 400 000.00 CHF.
        Prefer Accenture Advisory Europe if commercially competitive.
