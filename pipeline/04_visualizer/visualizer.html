<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChainIQ – Supplier Ranking Dashboard</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3348;
    --accent: #6366f1;
    --accent-hover: #818cf8;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --success: #34d399;
    --warn: #fbbf24;
    --error: #f87171;
    --radius: 10px;
    --gold: #fbbf24;
    --silver: #94a3b8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  header {
    width: 100%;
    padding: 20px 32px;
    display: flex;
    align-items: center;
    gap: 14px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  header .logo {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  header .logo span { color: var(--accent); }

  header .subtitle {
    color: var(--text-dim);
    font-size: 13px;
    margin-left: auto;
  }

  main {
    width: 100%;
    max-width: 1100px;
    padding: 36px 24px 60px;
  }

  h2 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .page-desc {
    color: var(--text-dim);
    font-size: 14px;
    margin-bottom: 28px;
  }

  /* ── Input area ─────────────────────────────── */
  .input-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 28px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--accent);
    margin-bottom: 14px;
  }

  textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px;
    font-size: 13px;
    color: var(--text);
    font-family: 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    resize: vertical;
    min-height: 120px;
    line-height: 1.5;
    outline: none;
    transition: border-color 0.15s;
  }

  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: #475569; }

  .btn-row {
    display: flex;
    gap: 12px;
    margin-top: 14px;
    align-items: center;
  }

  button {
    padding: 10px 22px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: background 0.15s, transform 0.1s;
    font-family: inherit;
  }

  button:active { transform: scale(0.97); }

  .btn-primary {
    background: var(--accent);
    color: #fff;
  }
  .btn-primary:hover { background: var(--accent-hover); }

  .btn-secondary {
    background: var(--surface2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: var(--border); color: var(--text); }

  .error-banner {
    color: var(--error);
    font-size: 13px;
    margin-left: 12px;
    display: none;
  }
  .error-banner.visible { display: inline; }

  /* ── Dashboard ──────────────────────────────── */
  #dashboard { display: none; }
  #dashboard.visible { display: block; }

  .meta-bar {
    display: flex;
    gap: 24px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .meta-item {
    font-size: 13px;
    color: var(--text-dim);
  }

  .meta-item strong {
    color: var(--text);
    font-weight: 600;
  }

  /* ── Dimension sections ─────────────────────── */
  .dimension {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }

  .dimension-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }

  .dimension-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
  }

  .dim-trusted .dimension-icon { background: rgba(99, 102, 241, 0.15); color: var(--accent); }
  .dim-fastest .dimension-icon { background: rgba(251, 191, 36, 0.15); color: var(--warn); }
  .dim-cheapest .dimension-icon { background: rgba(52, 211, 153, 0.15); color: var(--success); }

  .dimension-label {
    font-size: 16px;
    font-weight: 600;
  }

  .dimension-sub {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 400;
  }

  /* ── Supplier cards ─────────────────────────── */
  .cards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  @media (max-width: 700px) {
    .cards { grid-template-columns: 1fr; }
  }

  .card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    position: relative;
  }

  .card.pos-1 { border-color: var(--gold); }
  .card.pos-2 { border-color: var(--silver); }

  .card-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .pos-1 .card-badge { background: rgba(251, 191, 36, 0.2); color: var(--gold); }
  .pos-2 .card-badge { background: rgba(148, 163, 184, 0.2); color: var(--silver); }

  .card-supplier {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 2px;
    padding-right: 50px;
  }

  .card-id {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .card-highlight {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 14px;
  }

  .dim-trusted .card-highlight { color: var(--accent); }
  .dim-fastest .card-highlight { color: var(--warn); }
  .dim-cheapest .card-highlight { color: var(--success); }

  .card-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
  }

  .tag-preferred { background: rgba(99, 102, 241, 0.15); color: var(--accent); }
  .tag-incumbent { background: rgba(52, 211, 153, 0.15); color: var(--success); }
  .tag-lead-ok   { background: rgba(52, 211, 153, 0.15); color: var(--success); }
  .tag-lead-miss { background: rgba(248, 113, 113, 0.15); color: var(--error); }

  /* ── Score bars ─────────────────────────────── */
  .scores {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 14px;
  }

  .score-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .score-label {
    font-size: 11px;
    color: var(--text-dim);
    width: 55px;
    flex-shrink: 0;
    text-align: right;
  }

  .score-bar-bg {
    flex: 1;
    height: 6px;
    background: var(--bg);
    border-radius: 3px;
    overflow: hidden;
  }

  .score-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s ease;
  }

  .score-val {
    font-size: 11px;
    width: 32px;
    text-align: right;
    color: var(--text-dim);
  }

  .fill-price    { background: var(--success); }
  .fill-quality  { background: var(--accent); }
  .fill-risk     { background: var(--warn); }
  .fill-esg      { background: #a78bfa; }
  .fill-leadtime { background: #f472b6; }

  /* ── Detail metrics ─────────────────────────── */
  .card-metrics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 16px;
    font-size: 12px;
  }

  .metric-label {
    color: var(--text-dim);
  }

  .metric-value {
    text-align: right;
    font-weight: 500;
  }

  .card-note {
    margin-top: 12px;
    font-size: 12px;
    color: var(--text-dim);
    font-style: italic;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }

  /* ── Excluded table ─────────────────────────── */
  .excluded-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-top: 20px;
  }

  .excluded-section .section-title { color: var(--error); }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  th {
    text-align: left;
    color: var(--text-dim);
    font-weight: 500;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }

  td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
  }

  tr:last-child td { border-bottom: none; }
</style>
</head>
<body>

<header>
  <div class="logo">Chain<span>IQ</span></div>
  <div class="subtitle">Supplier Ranking Dashboard</div>
</header>

<main>
  <h2>Ranking Visualization</h2>
  <p class="page-desc">Paste the 03_ranker output JSON below, or use the sample data to preview the dashboard.</p>

  <!-- ── Input ─────────────────────────────────── -->
  <div class="input-section">
    <div class="section-title">Ranker Output (JSON)</div>
    <textarea id="jsonInput" placeholder='Paste 03_ranker output JSON here...'></textarea>
    <div class="btn-row">
      <button class="btn-primary" id="btnVisualize">Visualize</button>
      <button class="btn-secondary" id="btnSample">Load Sample</button>
      <span class="error-banner" id="errorBanner"></span>
    </div>
  </div>

  <!-- ── Dashboard ─────────────────────────────── -->
  <div id="dashboard">
    <div class="meta-bar" id="metaBar"></div>
    <div id="dimensionsContainer"></div>
    <div id="excludedContainer"></div>
  </div>
</main>

<script>
// ── Sample data matching 03_ranker output schema ────────────
const SAMPLE_DATA = {

  },
  ranking: [
    {

      },

    },
    {
      rank: 2,
      supplier_id: "SUP-0005",
      supplier_name: "Dell Enterprise Europe",
      is_preferred: false,
      is_incumbent: true,
      meets_lead_time: true,
      pricing_tier_applied: "100-499 units",
      unit_price: 155.00,
      total_price: 37200.00,
      expedited_unit_price: 167.40,
      expedited_total_price: 40176.00,
      standard_lead_time_days: 17,
      expedited_lead_time_days: 9,
      score_breakdown: {
        price_score: 0.78,
        quality_score: 0.92,
        risk_score: 0.74,
        esg_score: 0.66,
        lead_time_score: 1.0
      },
      composite_score: 0.83,
      recommendation_note: "Incumbent supplier. Highest quality score (0.92) but CHF 1,488 above lowest option."
    },
    {
      rank: 3,
      supplier_id: "SUP-0018",
      supplier_name: "HP Switzerland AG",
      is_preferred: false,
      is_incumbent: false,
      meets_lead_time: true,
      pricing_tier_applied: "100-499 units",
      unit_price: 152.30,
      total_price: 36552.00,
      expedited_unit_price: 164.50,
      expedited_total_price: 39480.00,
      standard_lead_time_days: 12,
      expedited_lead_time_days: 5,
      score_breakdown: {
        price_score: 0.91,
        quality_score: 0.78,
        risk_score: 0.80,
        esg_score: 0.71,
        lead_time_score: 1.0
      },
      composite_score: 0.86,
      recommendation_note: "Fastest standard delivery at 12 days. Competitive pricing, second lowest total."
    },
    {
      rank: 4,
      supplier_id: "SUP-0031",
      supplier_name: "Lenovo Enterprise EMEA",
      is_preferred: false,
      is_incumbent: false,
      meets_lead_time: false,
      pricing_tier_applied: "100-499 units",
      unit_price: 161.20,
      total_price: 38688.00,
      expedited_unit_price: 174.10,
      expedited_total_price: 41784.00,
      standard_lead_time_days: 21,
      expedited_lead_time_days: 12,
      score_breakdown: {
        price_score: 0.60,
        quality_score: 0.88,
        risk_score: 0.90,
        esg_score: 0.80,
        lead_time_score: 0.5
      },
      composite_score: 0.72,
      recommendation_note: "Strong quality and ESG scores. Lead time only met via expedited shipping."
    },
    {
      rank: 5,
      supplier_id: "SUP-0024",
      supplier_name: "Computacenter AG",
      is_preferred: false,
      is_incumbent: false,
      meets_lead_time: true,
      pricing_tier_applied: "100-499 units",
      unit_price: 157.50,
      total_price: 37800.00,
      expedited_unit_price: 170.10,
      expedited_total_price: 40824.00,
      standard_lead_time_days: 15,
      expedited_lead_time_days: 8,
      score_breakdown: {
        price_score: 0.71,
        quality_score: 0.75,
        risk_score: 0.70,
        esg_score: 0.68,
        lead_time_score: 1.0
      },
      composite_score: 0.78,
      recommendation_note: "Solid mid-range option across all dimensions."
    }
  ],
  excluded: [
    { supplier_id: "SUP-0009", supplier_name: "Insight Direct CH", reason: "Contract status: expired" },
    { supplier_id: "SUP-0037", supplier_name: "Atea Logistics", reason: "Restricted for this category" },
    { supplier_id: "SUP-0002", supplier_name: "CDW Switzerland", reason: "No active pricing for category Docking Stations" }
  ]
};

// ── DOM refs ────────────────────────────────────────────────
const jsonInput    = document.getElementById("jsonInput");
const btnVisualize = document.getElementById("btnVisualize");
const btnSample    = document.getElementById("btnSample");
const errorBanner  = document.getElementById("errorBanner");
const dashboard    = document.getElementById("dashboard");
const metaBar      = document.getElementById("metaBar");
const dimContainer = document.getElementById("dimensionsContainer");
const exclContainer= document.getElementById("excludedContainer");

// ── Events ──────────────────────────────────────────────────
btnSample.addEventListener("click", () => {
  jsonInput.value = JSON.stringify(SAMPLE_DATA, null, 2);
  errorBanner.classList.remove("visible");
});

btnVisualize.addEventListener("click", () => {
  errorBanner.classList.remove("visible");
  const raw = jsonInput.value.trim();
  if (!raw) {
    showError("Paste JSON or click Load Sample first.");
    return;
  }

  let data;
  try {
    data = JSON.parse(raw);
  } catch (e) {
    showError("Invalid JSON: " + e.message);
    return;
  }

  if (!data.ranking || !Array.isArray(data.ranking) || data.ranking.length === 0) {
    showError("JSON must contain a non-empty 'ranking' array.");
    return;
  }

  render(data);
});

function showError(msg) {
  errorBanner.textContent = msg;
  errorBanner.classList.add("visible");
  dashboard.classList.remove("visible");
}

// ── Formatting helpers ──────────────────────────────────────
function fmtCHF(n) {
  return "CHF " + n.toLocaleString("de-CH", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtScore(n) {
  return (n * 100).toFixed(0);
}

function fmtPct(n) {
  return (n * 100).toFixed(0) + "%";
}

// ── Dimension definitions ───────────────────────────────────
const DIMENSIONS = [
  {
    key: "most_trusted",
    label: "Most Trusted",
    sub: "Ranked by quality score (highest first)",
    icon: "&#9733;",  // star
    cssClass: "dim-trusted",
    sort: (a, b) => b.score_breakdown.quality_score - a.score_breakdown.quality_score,
    highlight: s => fmtScore(s.score_breakdown.quality_score) + " / 100",
  },
  {
    key: "fastest_shipment",
    label: "Fastest Shipment",
    sub: "Ranked by standard lead time (lowest first)",
    icon: "&#9889;",  // lightning
    cssClass: "dim-fastest",
    sort: (a, b) => a.standard_lead_time_days - b.standard_lead_time_days,
    highlight: s => s.standard_lead_time_days + " days",
  },
  {
    key: "lowest_cost",
    label: "Lowest Cost",
    sub: "Ranked by total price (lowest first)",
    icon: "&#9679;",  // circle (used as coin)
    cssClass: "dim-cheapest",
    sort: (a, b) => a.total_price - b.total_price,
    highlight: s => fmtCHF(s.total_price),
  },
];

// ── Render ───────────────────────────────────────────────────
function render(data) {
  // Meta bar
  const weights = data.scoring_weights || {};
  const wStr = Object.entries(weights).map(([k,v]) => `${k}: ${(v*100).toFixed(0)}%`).join(", ");
  metaBar.innerHTML = `
    <div class="meta-item"><strong>Request</strong> ${esc(data.request_id)}</div>
    <div class="meta-item"><strong>Ranked at</strong> ${esc(data.ranked_at)}</div>
    <div class="meta-item"><strong>k</strong> = ${data.k}</div>
    <div class="meta-item"><strong>Weights</strong> ${esc(wStr)}</div>
  `;

  // Dimensions
  dimContainer.innerHTML = "";
  for (const dim of DIMENSIONS) {
    const sorted = [...data.ranking].sort(dim.sort);
    const top2 = sorted.slice(0, 2);
    dimContainer.innerHTML += renderDimension(dim, top2);
  }

  // Excluded
  exclContainer.innerHTML = "";
  if (data.excluded && data.excluded.length > 0) {
    exclContainer.innerHTML = renderExcluded(data.excluded);
  }

  dashboard.classList.add("visible");
  dashboard.scrollIntoView({ behavior: "smooth", block: "start" });
}

function renderDimension(dim, suppliers) {
  const cards = suppliers.map((s, i) => renderCard(s, i + 1, dim)).join("");
  return `
    <div class="dimension ${dim.cssClass}">
      <div class="dimension-header">
        <div class="dimension-icon">${dim.icon}</div>
        <div>
          <div class="dimension-label">${dim.label}</div>
          <div class="dimension-sub">${dim.sub}</div>
        </div>
      </div>
      <div class="cards">${cards}</div>
    </div>
  `;
}

function renderCard(s, pos, dim) {
  const sb = s.score_breakdown;

  let tags = "";
  if (s.is_preferred) tags += '<span class="tag tag-preferred">Preferred</span>';
  if (s.is_incumbent) tags += '<span class="tag tag-incumbent">Incumbent</span>';
  if (s.meets_lead_time) {
    tags += '<span class="tag tag-lead-ok">Meets deadline</span>';
  } else {
    tags += '<span class="tag tag-lead-miss">Misses deadline</span>';
  }

  const noteHtml = s.recommendation_note
    ? `<div class="card-note">${esc(s.recommendation_note)}</div>`
    : "";

  return `
    <div class="card pos-${pos}">
      <div class="card-badge">#${pos}</div>
      <div class="card-supplier">${esc(s.supplier_name)}</div>
      <div class="card-id">${esc(s.supplier_id)} &middot; Rank ${s.rank} overall</div>
      <div class="card-highlight">${dim.highlight(s)}</div>
      <div class="card-tags">${tags}</div>
      <div class="scores">
        ${scoreBar("Price",   sb.price_score,    "fill-price")}
        ${scoreBar("Quality", sb.quality_score,   "fill-quality")}
        ${scoreBar("Risk",    sb.risk_score,      "fill-risk")}
        ${scoreBar("ESG",     sb.esg_score,       "fill-esg")}
        ${scoreBar("Lead",    sb.lead_time_score,  "fill-leadtime")}
      </div>
      <div class="card-metrics">
        <span class="metric-label">Unit price</span>
        <span class="metric-value">${fmtCHF(s.unit_price)}</span>
        <span class="metric-label">Total price</span>
        <span class="metric-value">${fmtCHF(s.total_price)}</span>
        <span class="metric-label">Std lead time</span>
        <span class="metric-value">${s.standard_lead_time_days} days</span>
        <span class="metric-label">Expedited</span>
        <span class="metric-value">${s.expedited_lead_time_days != null ? s.expedited_lead_time_days + " days" : "N/A"}</span>
        <span class="metric-label">Composite</span>
        <span class="metric-value">${s.composite_score.toFixed(2)}</span>
        <span class="metric-label">Tier</span>
        <span class="metric-value">${esc(s.pricing_tier_applied)}</span>
      </div>
      ${noteHtml}
    </div>
  `;
}

function scoreBar(label, value, fillClass) {
  const pct = (value * 100).toFixed(0);
  return `
    <div class="score-row">
      <span class="score-label">${label}</span>
      <div class="score-bar-bg">
        <div class="score-bar-fill ${fillClass}" style="width: ${pct}%"></div>
      </div>
      <span class="score-val">${pct}</span>
    </div>
  `;
}

function renderExcluded(excluded) {
  const rows = excluded.map(e => `
    <tr>
      <td>${esc(e.supplier_id)}</td>
      <td>${esc(e.supplier_name)}</td>
      <td>${esc(e.reason)}</td>
    </tr>
  `).join("");

  return `
    <div class="excluded-section">
      <div class="section-title">Excluded Suppliers</div>
      <table>
        <thead><tr><th>ID</th><th>Supplier</th><th>Reason</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  `;
}

function esc(str) {
  if (str == null) return "";
  const d = document.createElement("div");
  d.textContent = String(str);
  return d.innerHTML;
}
</script>
</body>
