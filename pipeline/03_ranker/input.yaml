# ============================================================
# 03_ranker  –  Input
# ============================================================
# Receives the validated request from 02_checker plus the
# business databases (suppliers + pricing) needed to score
# and rank candidate suppliers.
#
# Assumptions: single country (CH), currency (CHF), language (en).
# ============================================================

schema_version: "1.0"
module: 03_ranker
direction: input
description: >
  A validated request paired with supplier and pricing master
  data. The ranker uses all three to produce a scored ranking.

fields:

  # ── Validated request (from 02_checker/output) ─────────────

  request:
    type: object
    required: true
    description: >
      Single validated request record as emitted by 02_checker.
      See 02_checker/output.yaml for the full schema.
    schema_ref: "../02_checker/output.yaml"

  # ── Supplier master data (suppliers.csv) ───────────────────

  suppliers:
    type: list
    required: true
    description: >
      Supplier catalogue. Each row represents one
      supplier × category combination.
    item_schema:
      supplier_id:
        type: string
        description: Unique supplier identifier (SUP-XXXX).
      supplier_name:
        type: string
      category_l1:
        type: string
        enum:
          - IT
          - Facilities
          - Professional Services
          - Marketing
      category_l2:
        type: string
        enum:
          # IT
          - Laptops
          - Mobile Workstations
          - Desktop Workstations
          - Monitors
          - Docking Stations
          - Smartphones
          - Tablets
          - Rugged Devices
          - Accessories Bundles
          - Replacement / Break-Fix Pool Devices
          - Cloud Compute
          - Cloud Storage
          - Cloud Networking
          - Managed Cloud Platform Services
          - Cloud Security Services
          # Facilities
          - Workstations and Desks
          - Office Chairs
          - Meeting Room Furniture
          - Storage Cabinets
          - Reception and Lounge Furniture
          # Professional Services
          - Cloud Architecture Consulting
          - Cybersecurity Advisory
          - Data Engineering Services
          - Software Development Services
          - IT Project Management Services
          # Marketing
          - Search Engine Marketing (SEM)
          - Social Media Advertising
          - Content Production Services
          - Marketing Analytics Services
          - Influencer Campaign Management
      pricing_model:
        type: string
        enum: [tiered, usage, day_rate, blended_rate, subscription, performance, fixed]
      quality_score:
        type: number
        description: 0-100, higher is better.
      risk_score:
        type: number
        description: 0-100, lower is better.
      esg_score:
        type: number
        description: 0-100, higher is better.
      preferred_supplier:
        type: boolean
      is_restricted:
        type: boolean
      restriction_reason:
        type: string
        nullable: true
      contract_status:
        type: string
        enum: [active, expired, pending]
      capacity_per_month:
        type: number
        nullable: true

  # ── Pricing data (pricing.csv) ─────────────────────────────

  pricing:
    type: list
    required: true
    description: >
      Pricing tiers and lead times per supplier × category.
      All prices in CHF.
    item_schema:
      pricing_id:
        type: string
      supplier_id:
        type: string
      category_l1:
        type: string
      category_l2:
        type: string
      pricing_model:
        type: string
      min_quantity:
        type: number
      max_quantity:
        type: number
      unit_price:
        type: number
        description: Unit price in CHF.
      moq:
        type: number
        description: Minimum order quantity.
      standard_lead_time_days:
        type: number
      expedited_lead_time_days:
        type: number
      expedited_unit_price:
        type: number
        description: Expedited unit price in CHF.
      valid_from:
        type: string
        format: date
      valid_to:
        type: string
        format: date
